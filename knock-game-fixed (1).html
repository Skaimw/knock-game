window.addEventListener('load',()=>{
  // Check for casino/multiplayer launch params
  const urlParams = new URLSearchParams(window.location.search);
  const token     = urlParams.get('token');
  const tableId   = urlParams.get('tableId');
  const operator  = urlParams.get('operator') || 'standalone';
  const serverUrl = urlParams.get('server') || window.KNOCK_SERVER_URL || null;
  if(serverUrl) window.KNOCK_SERVER_URL = serverUrl;

  if(token || tableId || serverUrl){
    // Multiplayer mode — connect to game server
    initMultiplayer(token, tableId, operator);
  } else {
    // Standalone AI mode
    if(!loadState()){
      // Nothing to restore — title screen visible
    }
  }
});

window.addEventListener('resize',()=>{
  if(G&&!G.gameOver) render();
});

// ============================================================
// MULTIPLAYER CLIENT
// ============================================================
let MP = null; // multiplayer state: { socket, playerId, tableId, myIdx }

function initMultiplayer(token, tableId, operator){
  // Load Socket.IO dynamically
  const script = document.createElement('script');
  script.src = (window.KNOCK_SERVER_URL || 'http://localhost:3001') + '/socket.io/socket.io.js';
  script.onload = () => connectToServer(token, tableId, operator);
  script.onerror = () => {
    // Server unreachable — fall back to standalone
    showToast('Server offline — playing vs AI');
    if(!loadState()) {} // standalone mode
  };
  document.head.appendChild(script);
}

function connectToServer(token, tableId, operator){
  const serverUrl = window.KNOCK_SERVER_URL || 'http://localhost:3001';
  const socket = io(serverUrl, { transports: ['websocket','polling'] });

  MP = { socket, playerId: null, tableId: null, myIdx: -1, isMultiplayer: true };

  socket.on('connect', () => {
    console.log('[MP] Connected to server');
    // Hide title screen, show loading
    document.getElementById('title-screen').classList.add('hidden');
    showToast('Connecting to table...');

    const playerName = document.getElementById('player-name-input')?.value?.trim() || 'You';
    socket.emit('joinTable', { token, tableId, name: playerName });
  });

  socket.on('joined', ({ playerId, tableId: tid, balance }) => {
    MP.playerId = playerId;
    MP.tableId  = tid;
    // Init T for balance display
    T = T || { players: [], roundNum: 0, ante: 500 };
    showToast('Joined table — waiting for players...');
  });

  socket.on('tableState', (state) => {
    // Update tournament player list
    if(!T) T = { players: [], roundNum: state.roundNum || 0, ante: state.ante || 500 };
    T.roundNum = state.roundNum || T.roundNum;
    T.players = state.players.map(p => ({
      name: p.name, balance: p.balance,
      isHuman: p.id === MP.playerId, eliminated: p.eliminated,
    }));
    if(G) render();
  });

  socket.on('pickPhase', ({ round, seedHash, pool, players: plist }) => {
    T.roundNum = round;
    showFairBadge(seedHash);
    startMPPickPhase(pool, plist);
  });

  socket.on('playerPicked', ({ playerId, cardIdx }) => {
    if(PICK && playerId !== MP.playerId){
      // Mark AI/other player picks on screen
      PICK.picks[plist_idxOf(playerId)] = { cardIdx, card: PICK.cards[cardIdx] };
      renderPickScreen();
    }
  });

  socket.on('pickReveal', ({ picks, startsFirst }) => {
    // Show revealed cards
    if(PICK){
      Object.entries(picks).forEach(([pid, {cardIdx, card}]) => {
        PICK.picks[cardIdx] = { card };
      });
      renderPickScreen();
    }
  });

  socket.on('gameState', (state) => {
    // Server sends personalised game state (includes our hand, others' hand sizes)
    applyServerGameState(state);
  });

  socket.on('gameEvents', (events) => {
    events.forEach(e => log(e, e.includes('wins') || e.includes('KNOCK') || e.includes('cancelled') || e.includes('reversed')));
  });

  socket.on('turnTimeout', ({ playerId, drew }) => {
    if(playerId === MP.playerId) showToast(`Time out — drew ${drew} card${drew>1?'s':''}`);
  });

  socket.on('moveRejected', ({ error }) => {
    showToast(error || 'Invalid move');
    animating = false;
    startTurnTimer();
    render();
  });

  socket.on('roundEnd', (data) => {
    resolveRound_MP(data);
  });

  socket.on('tournamentEnd', ({ champion, name, balance }) => {
    const isMe = champion === MP.playerId;
    document.getElementById('tourney-title').textContent = isMe ? '🏆 YOU WIN!' : '🏆 CHAMPION!';
    document.getElementById('tourney-winner').textContent = name + ' takes everything';
    document.getElementById('tourney-prize').textContent  = 'Final balance: MWK ' + balance.toLocaleString();
    spawnConfetti2();
    document.getElementById('tourney-screen').classList.remove('hidden');
  });

  socket.on('playerDisconnected', ({ playerId: pid, name }) => {
    if(pid !== MP.playerId) showToast(name + ' disconnected');
  });
  socket.on('playerReconnected', ({ name }) => showToast(name + ' reconnected'));

  socket.on('error', ({ code, message }) => {
    showToast(message || code);
    if(code === 'TABLE_BUSY' || code === 'TABLE_FULL'){
      // Redirect to a new table
      window.location.search = '?token=' + token;
    }
  });

  socket.on('disconnect', () => {
    showToast('Disconnected — reconnecting...');
    setTimeout(() => {
      if(MP.playerId && MP.tableId){
        socket.emit('reconnect', { playerId: MP.playerId, tableId: MP.tableId });
      }
    }, 2000);
  });
}

function applyServerGameState(state){
  // Convert server state into local G format
  if(!G){
    G = {
      players: [], humanIdx: -1, deck: new Array(state.deckSize).fill({}),
      discardPile: [state.discardTop], direction: state.direction,
      currentPlayer: state.currentPlayer, activeSuit: state.activeSuit,
      penaltyDraw: state.penaltyDraw, penaltyActive: state.penaltyActive,
      awaitingSuit: state.awaitingSuit, pendingSkip: false,
      gameOver: state.gameOver, _aceOnDone: null,
    };
  }

  G.direction      = state.direction;
  G.currentPlayer  = state.currentPlayer;
  G.activeSuit     = state.activeSuit;
  G.penaltyDraw    = state.penaltyDraw;
  G.penaltyActive  = state.penaltyActive;
  G.awaitingSuit   = state.awaitingSuit;
  G.gameOver       = state.gameOver;
  G.discardPile    = [state.discardTop];
  G.deck           = new Array(state.deckSize).fill({});

  G.players = state.players.map((sp, i) => {
    const isMe = sp.id === MP.playerId;
    if(isMe) G.humanIdx = i;
    return {
      name:    sp.name,
      hand:    sp.hand || new Array(sp.handSize).fill({}),
      knocked: sp.knocked,
      isHuman: isMe,
      connected: sp.connected,
    };
  });

  MP.myIdx = G.humanIdx;
  animating = false;

  // Show game screen
  document.getElementById('pick-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');

  render();

  // Handle ace suit modal
  if(state.awaitingSuit && G.currentPlayer === G.humanIdx){
    document.getElementById('suit-modal').classList.remove('hidden');
    G._aceOnDone = () => {};
  } else {
    document.getElementById('suit-modal').classList.add('hidden');
  }
}

function startMPPickPhase(pool, playerList){
  const players = playerList.map(p => ({
    name: p.name, hand: [], isHuman: p.id === MP.playerId, knocked: false,
  }));
  PICK = { players, cards: pool, picks: {}, humanPicked: false, done: false };

  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('win-screen').classList.add('hidden');
  document.getElementById('pick-screen').classList.remove('hidden');
  renderPickScreen();
  Audio.shuffle();
}

function plist_idxOf(playerId){
  if(!PICK) return -1;
  // We don't have server player IDs in PICK — approximate by name match
  return -1;
}

// Override playerPlayCard to send moves to server in multiplayer mode
const _origPlayerPlayCard = playerPlayCard;
function playerPlayCard(cardIdx){
  if(!MP || !MP.isMultiplayer){ _origPlayerPlayCard(cardIdx); return; }
  if(!G || G.gameOver || G.awaitingSuit || animating) return;
  if(G.currentPlayer !== G.humanIdx) return;

  const player = G.players[G.humanIdx];
  const card   = player.hand[cardIdx];
  if(!card || !card.rank) return; // dummy card (opponent slot)

  stopTurnTimer();

  // Combo mode — collect cards, send when support is tapped
  if(eightComboMode){
    if(selectedCards.includes(cardIdx)){
      selectedCards = selectedCards.filter(i=>i!==cardIdx);
      if(selectedCards.length===0) eightComboMode=false;
      render(); return;
    }
    if(card.rank==='8'){selectedCards.push(cardIdx);render();return;}
    // Support card tapped — send combo move
    const eightCards = selectedCards.map(i=>player.hand[i]);
    const moveCards  = [...eightCards, card];
    selectedCards=[]; eightComboMode=false;
    sendMove({ type:'play', cards: moveCards });
    return;
  }

  // All-8s finishing
  if(card.rank==='8' && player.hand.every(h=>h.rank==='8')){
    sendMove({ type:'play', cards:[...player.hand] }); return;
  }

  // 8 entry
  if(card.rank==='8' && !G.penaltyActive){
    const hasOther8 = player.hand.some((h,i)=>i!==cardIdx&&h.rank==='8');
    const hasSupport = player.hand.some((h,i)=>i!==cardIdx&&h.suit===card.suit&&h.rank!=='8');
    if(hasOther8||hasSupport){ selectedCards=[cardIdx];eightComboMode=true;render();return; }
    sendMove({ type:'play', cards:[card] }); return;
  }

  sendMove({ type:'play', cards:[card] });
}

// Override playerDraw
const _origPlayerDraw = playerDraw;
function playerDraw(){
  if(!MP || !MP.isMultiplayer){ _origPlayerDraw(); return; }
  if(!G||G.gameOver||G.awaitingSuit||animating) return;
  if(G.currentPlayer!==G.humanIdx) return;
  stopTurnTimer();
  if(eightComboMode) cancelCombo();
  sendMove({ type:'draw' });
}

// Override declareSuit
const _origDeclareSuit = declareSuit;
function declareSuit(suit){
  if(!MP || !MP.isMultiplayer){ _origDeclareSuit(suit); return; }
  document.getElementById('suit-modal').classList.add('hidden');
  sendMove({ type:'declareSuit', suit });
}

function sendMove(move){
  if(!MP || !MP.socket) return;
  animating = true; // prevent double-clicks while server processes
  MP.socket.emit('playMove', { move });
}

function resolveRound_MP(data){
  Audio.win_jingle();
  if(T){
    T.roundNum = data.round;
    data.results.forEach(r => {
      const tp = T.players.find(p=>p.name===r.name);
      if(tp){ tp.balance=r.balance; tp.eliminated=r.eliminated; tp._roundDelta=r.delta; }
    });
  }
  showRoundResult(data.winnerName, data.pot, data.isFinal);
  // Seed reveal for provably fair
  if(data.masterSeed){
    const badge = document.getElementById('fair-badge');
    if(badge) badge.title = 'Seed: ' + data.masterSeed + '\nHash: ' + data.seedHash + '\n\nSHA-256(seed) == hash';
  }
}

// Override nextRound button for multiplayer
function mpNextRound(){
  if(MP && MP.isMultiplayer && MP.socket){
    document.getElementById('win-screen').classList.add('hidden');
    MP.socket.emit('nextRound');
  } else {
    startNewRound();
  }
}
